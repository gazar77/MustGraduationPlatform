<div class="container py-4">
    <h1 class="mb-4">{{ editingId ? 'تعديل فكرة' : 'فكرة جديدة' }}</h1>

    <div *ngIf="loading" class="alert alert-info">جاري التحميل…</div>
    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="save()" class="card p-4" *ngIf="!loading">
        <div class="mb-3">
            <label class="form-label">العنوان</label>
            <input class="form-control" formControlName="title" />
        </div>
        <div class="mb-3">
            <label class="form-label">الوصف</label>
            <textarea class="form-control" rows="4" formControlName="description"></textarea>
        </div>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label">التصنيف</label>
                <input class="form-control" formControlName="category" />
            </div>
            <div class="col-md-3">
                <label class="form-label">الصعوبة</label>
                <select class="form-select" formControlName="difficulty">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">الحد الأقصى للفريق</label>
                <input type="number" class="form-control" formControlName="maxTeamSize" />
            </div>
        </div>
        <div class="row g-3 mb-3">
            <div class="col-md-4">
                <label class="form-label">الحالة</label>
                <select class="form-select" formControlName="status">
                    <option value="Open">Open</option>
                    <option value="Reserved">Reserved</option>
                    <option value="Approved">Approved</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">ترتيب العرض</label>
                <input type="number" class="form-control" formControlName="displayOrder" />
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" formControlName="isVisible" id="vis" />
                    <label class="form-check-label" for="vis">ظاهر في الموقع</label>
                </div>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" [disabled]="saving">{{ saving ? 'جاري الحفظ…' : 'حفظ' }}</button>
            <button type="button" class="btn btn-outline-secondary" (click)="cancel()" [disabled]="saving">إلغاء</button>
        </div>
    </form>
</div>
