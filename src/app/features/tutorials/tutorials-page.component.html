<div class="tutorials-page" [attr.dir]="(lang.currentLang$ | async) === 'ar' ? 'rtl' : 'ltr'">
  <app-hero-banner></app-hero-banner>

  <div class="container py-5 tutorials-page__main">
    <h2 class="tutorials-page__heading">{{ lang.translate('tutorials.list.heading') }}</h2>
    <p class="text-muted mb-4">{{ lang.translate('tutorials.list.intro') }}</p>

    <div class="tutorials-grid" *ngIf="documents.length > 0">
      <div *ngFor="let doc of documents" class="tutorial-card card">
        <div class="tutorial-card__icon" [attr.aria-hidden]="true">
          <i class="fas" [ngClass]="fileIconClass(doc.fileUrl)"></i>
        </div>
        <div class="tutorial-card__body">
          <h3 class="tutorial-card__title">{{ doc.title }}</h3>
          <p class="tutorial-card__desc">{{ doc.description }}</p>
          <div class="tutorial-card__meta">
            <span class="tutorial-card__size">{{ doc.fileSize }}</span>
            <span class="tutorial-card__date">{{ lang.translate('tutorials.list.lastUpdate') }} {{ doc.lastUpdate | date:'shortDate' }}</span>
          </div>
        </div>
        <button type="button"
                class="btn btn-primary tutorial-card__btn"
                [disabled]="!canDownload(doc)"
                (click)="downloadDoc(doc)">
          {{ lang.translate('tutorials.list.download') }}
        </button>
      </div>
    </div>

    <div *ngIf="documents.length === 0 && !loading" class="tutorials-empty text-center py-5">
      <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
      <p class="text-muted mb-0">{{ lang.translate('tutorials.list.empty') }}</p>
    </div>

    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
  </div>
</div>
