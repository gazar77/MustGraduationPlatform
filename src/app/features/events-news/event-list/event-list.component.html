<div class="events-page" [attr.dir]="(langService.currentLang$ | async) === 'ar' ? 'rtl' : 'ltr'">
  <app-hero-banner [title]="langService.translate('events.list.title')" [compact]="true"></app-hero-banner>

  <!-- Events Grid Section -->
  <section class="events-section">
    <div class="container">
      <div class="events-grid">
        <article class="event-card" *ngFor="let event of events">
          <div class="event-image">
            <img [src]="event.image" [alt]="event.title">
            <span class="category-badge" [ngClass]="event.category">{{ getCategoryTranslation(event.category) }}</span>
          </div>
          <div class="event-content">
            <div class="event-meta">
               <span class="meta-item"><i class="fas fa-calendar-alt"></i> {{ event.date }}</span>
               <span class="meta-item"><i class="fas fa-clock"></i> {{ event.time }}</span>
            </div>
            <h3 class="event-title">{{ event.title }}</h3>
            <p class="event-desc">{{ event.description }}</p>
            <div class="event-footer">
               <span class="location"><i class="fas fa-map-marker-alt"></i> {{ event.location }}</span>
               <button class="btn btn-outline" [routerLink]="['/events/details', event.id]">{{ langService.translate('events.list.detailsBtn') }}</button>
            </div>
          </div>
        </article>
      </div>
    </div>
  </section>
</div>
