<div
  class="news-events-full-page"
  [attr.dir]="(langService.currentLang$ | async) === 'ar' ? 'rtl' : 'ltr'">

  <app-news-list *ngIf="section === 'news'" [viewAll]="true"></app-news-list>

</div>
