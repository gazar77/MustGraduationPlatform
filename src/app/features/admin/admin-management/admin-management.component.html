<div class="admin-management-page container py-4">
    <app-management-table 
        [title]="title" 
        [items]="items" 
        [columns]="columns"
        [showStatus]="showTableStatus"
        [showAddButton]="showAddButton"
        [showReportButtons]="showReportButtons"
        [ideaOpenClosedToggle]="ideaOpenClosedToggle"
        (add)="onAdd()"
        (edit)="onEdit($event)"
        (toggleStatus)="onStatusToggle($event)"
        (delete)="onDelete($event)"
        (exportPdf)="exportApprovedReport('pdf', $event)"
        (exportExcel)="exportApprovedReport('excel', $event)">
    </app-management-table>

    <!-- Management Modal -->
    <app-management-modal 
        [isOpen]="modalConfig.isOpen" 
        [title]="modalConfig.title" 
        [fields]="modalConfig.fields"
        [showPdfDownload]="showIdeaRegistrationPdfDownload"
        [showFileDownload]="showProjectFileDownload"
        (close)="modalConfig.isOpen = false"
        (save)="handleSave($event)"
        (downloadPdf)="downloadIdeaRegistrationPdf()"
        (downloadFile)="openUploadedProjectFile()">
    </app-management-modal>
</div>
