<div class="user-list-admin">
  <h2 class="mb-4">المستخدمون</h2>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2">جاري التحميل...</p>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="!loading && !error" class="table-responsive">
    <table class="table table-striped table-bordered align-middle">
      <thead class="table-light">
        <tr>
          <th>الاسم</th>
          <th>البريد</th>
          <th>الدور</th>
          <th>القسم</th>
          <th *ngIf="isAdmin" style="width: 160px">إجراءات</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of users">
          <td>{{ u.name }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.role }}</td>
          <td>{{ u.departmentCode || '—' }}</td>
          <td *ngIf="isAdmin">
            <button *ngIf="isSuperAdmin" type="button" class="btn btn-sm btn-outline-primary me-1" (click)="editUser(u)">تعديل</button>
            <button *ngIf="canDelete(u)" type="button" class="btn btn-sm btn-outline-danger" (click)="deleteUser(u)">حذف</button>
          </td>
        </tr>
      </tbody>
    </table>
    <p *ngIf="users.length === 0" class="text-muted">لا يوجد مستخدمون.</p>
  </div>
</div>
