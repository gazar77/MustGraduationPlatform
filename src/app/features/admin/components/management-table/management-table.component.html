<div class="management-container card">
    <div class="table-header">
        <div class="header-left">
            <h2>{{ title }}</h2>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="بحث باسم العنصر..." #searchInput (keyup)="0">
            </div>
        </div>
        <div class="header-actions">
            <div class="report-year-filter" *ngIf="showReportButtons">
                <label class="report-year-label" for="report-year-select">سنة التقرير</label>
                <select
                    id="report-year-select"
                    name="reportYear"
                    class="report-year-select"
                    [(ngModel)]="selectedReportYear">
                    <option [ngValue]="null">جميع السنوات</option>
                    <option *ngFor="let y of reportYearChoices" [ngValue]="y">{{ y }}</option>
                </select>
            </div>
            <button *ngIf="showReportButtons" type="button" class="btn btn-report" (click)="exportPdf.emit(selectedReportYear)">
                <i class="fas fa-file-pdf"></i> تقرير PDF
            </button>
            <button *ngIf="showReportButtons" type="button" class="btn btn-report-excel" (click)="exportExcel.emit(selectedReportYear)">
                <i class="fas fa-file-excel"></i> تقرير Excel
            </button>
            <button *ngIf="showAddButton" class="btn btn-primary" (click)="onAdd()">
                <i class="fas fa-plus"></i> إضافة جديد
            </button>
        </div>
    </div>

    <div class="table-responsive">
        <table class="m-table">
            <thead>
                <tr>
                    <th *ngFor="let col of columns">{{ col.label }}</th>
                    <th *ngIf="showStatus">الحالة</th>
                    <th class="actions-col">الإجراءات</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of items | filterByTitle:searchInput.value">
                    <td *ngFor="let col of columns">
                        <ng-container [ngSwitch]="col.key">
                            <span *ngSwitchCase="'date'">{{ item[col.key] | date:'shortDate' }}</span>
                            <span *ngSwitchCase="'publishDate'">{{ item[col.key] | date:'shortDate' }}</span>
                            <span *ngSwitchCase="'lastUpdate'">{{ item[col.key] | date:'shortDate' }}</span>
                            <span *ngSwitchCase="'submissionDate'">{{ item[col.key] | date:'shortDate' }}</span>
                            <span *ngSwitchDefault>{{ item[col.key] }}</span>
                        </ng-container>
                    </td>
                    <td *ngIf="showStatus">
                        <label class="switch" *ngIf="ideaOpenClosedToggle">
                            <input type="checkbox" [checked]="item.status === 'Open'" (change)="toggleStatus.emit(item)">
                            <span class="slider round"></span>
                        </label>
                        <span *ngIf="ideaOpenClosedToggle" class="small text-muted ms-2">{{ item.status === 'Open' ? 'مفتوح' : 'مغلق' }}</span>
                        <label class="switch" *ngIf="!ideaOpenClosedToggle">
                            <input type="checkbox" [checked]="item.isVisible !== false" (change)="toggleStatus.emit(item)">
                            <span class="slider round"></span>
                        </label>
                    </td>
                    <td class="actions-cell">
                        <button class="action-btn edit" (click)="onEdit(item)" title="تعديل">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn delete" (click)="onDelete(item)" title="حذف">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="empty-state" *ngIf="items.length === 0">
        <i class="fas fa-box-open"></i>
        <p>لا توجد بيانات متاحة حالياً.</p>
    </div>
</div>
