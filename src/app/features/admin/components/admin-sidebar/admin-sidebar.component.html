<aside class="admin-sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <img src="assets/1740307452_295_53683_logo.svg" alt="Logo" style="width: 120px; height: auto; max-width: 100%;">
    <span *ngIf="!isCollapsed">لوحة التحكم</span>
  </div>

  <nav class="sidebar-nav">
    <ul>
      <li>
        <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <span *ngIf="!isCollapsed">الرئيسية</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/manage/ideas" routerLinkActive="active">
          <span *ngIf="!isCollapsed">إدارة المشاريع</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/manage/news" routerLinkActive="active">
          <span *ngIf="!isCollapsed">إدارة التحديثات</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/manage/events" routerLinkActive="active">
          <span *ngIf="!isCollapsed">إدارة الفعاليات</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/manage/templates" routerLinkActive="active">
          <span *ngIf="!isCollapsed">إدارة النماذج</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/manage/proposals" routerLinkActive="active">
          <span *ngIf="!isCollapsed">إدارة المقترحات</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/manage/project1" routerLinkActive="active">
          <span *ngIf="!isCollapsed">تسليمات المشروع 1</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/manage/project2" routerLinkActive="active">
          <span *ngIf="!isCollapsed">تسليمات المشروع 2</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/manage/contact" routerLinkActive="active">
          <span *ngIf="!isCollapsed">رسائل التواصل</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/users" routerLinkActive="active">
          <span *ngIf="!isCollapsed">المستخدمين</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/settings" routerLinkActive="active">
          <span *ngIf="!isCollapsed">إعدادات الموقع</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <a routerLink="/dashboard" class="sidebar-home-link" *ngIf="!isCollapsed">
      <i class="fas fa-home"></i> الرئيسية
    </a>
    <button (click)="logout()">
      <i class="fas fa-sign-out-alt"></i> <span *ngIf="!isCollapsed">تسجيل الخروج</span>
    </button>
  </div>
</aside>
