<div class="requirements-container container py-5">
    <div class="card p-4">
        <h2 class="text-primary mb-4 text-center">{{ title }}</h2>

        <div class="alert alert-info">
            <i class="fas fa-info-circle me-2"></i>
            يرجى رفع جميع المستندات المطلوبة للمرحلة رقم {{ requirementNumber }} في ملف مضغوط واحد (ZIP) أو بصيغة PDF.
        </div>

        <div *ngIf="lastUploadUrl" class="alert alert-success mt-3">
            آخر ملف مرفوع:
            <a [href]="lastUploadUrl" target="_blank" rel="noopener">فتح / تنزيل</a>
        </div>

        <div *ngIf="successMessage" class="alert alert-success mt-3">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="alert alert-danger mt-3">{{ errorMessage }}</div>

        <div class="upload-section mt-5 text-center">
            <div class="upload-box p-5 border-dashed">
                <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
                <h4>قم بسحب الملف هنا أو اضغط للاختيار</h4>
                <input type="file" (change)="onFileSelected($event)" class="file-input" [disabled]="uploading">
            </div>

            <div class="mt-4">
                <button type="button" class="btn btn-primary btn-lg px-5" (click)="submit()" [disabled]="uploading">
                    {{ uploading ? 'جاري الرفع…' : 'تسليم المتطلبات' }}
                </button>
            </div>
        </div>
    </div>
</div>
