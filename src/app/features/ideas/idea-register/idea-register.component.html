<div class="registration-container container py-5" [attr.dir]="(langService.currentLang$ | async) === 'ar' ? 'rtl' : 'ltr'">
    <app-hero-banner 
        [title]="langService.translate('ideas.register.title')"
        [breadcrumbs]="[
            { label: langService.translate('nav.home'), url: '/dashboard' },
            { label: langService.translate('nav.ideas'), url: '/ideas' },
            { label: langService.translate('nav.registration') }
        ]"
        [compact]="true">
    </app-hero-banner>
        <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">{{ langService.translate('ideas.register.projectTitle') }}</label>
                    <input type="text" class="form-control" name="title" [(ngModel)]="formData.title" required
                        [placeholder]="langService.translate('ideas.register.projectTitlePlaceholder')">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">{{ langService.translate('ideas.register.category') }}</label>
                    <select class="form-select" name="category" [(ngModel)]="formData.category" required>
                        <option value="">{{ langService.translate('ideas.register.selectCategory') }}</option>
                        <option value="AI">{{ langService.translate('ideas.register.categories.AI') }}</option>
                        <option value="Web">{{ langService.translate('ideas.register.categories.Web') }}</option>
                        <option value="Mobile">{{ langService.translate('ideas.register.categories.Mobile') }}</option>
                        <option value="Cyber">{{ langService.translate('ideas.register.categories.Cyber') }}</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">{{ langService.translate('ideas.register.description') }}</label>
                <textarea class="form-control" name="description" [(ngModel)]="formData.description" rows="4" required
                    [placeholder]="langService.translate('ideas.register.descriptionPlaceholder')"></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">{{ langService.translate('ideas.register.leaderName') }}</label>
                    <input type="text" class="form-control" name="leaderName" [(ngModel)]="formData.leaderName"
                        required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">{{ langService.translate('ideas.register.leaderId') }}</label>
                    <input type="text" class="form-control" name="leaderId" [(ngModel)]="formData.leaderId" required>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary px-5" [disabled]="!registerForm.form.valid">{{ langService.translate('ideas.register.submitBtn') }}</button>
            </div>
        </form>
    </div>
