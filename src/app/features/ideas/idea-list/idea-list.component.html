<div class="ideas-page container" [attr.dir]="(langService.currentLang$ | async) === 'ar' ? 'rtl' : 'ltr'">
    <app-hero-banner 
        [title]="langService.translate('ideas.title')"
        [breadcrumbs]="[
            { label: langService.translate('nav.home'), url: '/dashboard' },
            { label: langService.translate('nav.ideas') }
        ]"
        [compact]="true">
    </app-hero-banner>

    <div class="filters-section card">
        <div class="search-box">
            <input type="text" [placeholder]="langService.translate('ideas.searchPlaceholder')" [(ngModel)]="searchQuery" (input)="filterIdeas()">
        </div>
        <div class="filter-group">
            <select [(ngModel)]="selectedCategory" (change)="filterIdeas()">
                <option value="">{{ langService.translate('ideas.filters.allCategories') }}</option>
                <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
            </select>
            <select [(ngModel)]="selectedStatus" (change)="filterIdeas()">
                <option value="">{{ langService.translate('ideas.filters.allStatuses') }}</option>
                <option value="Open">{{ langService.translate('ideas.filters.available') }}</option>
                <option value="Reserved">{{ langService.translate('ideas.filters.reserved') }}</option>
                <option value="Approved">{{ langService.translate('ideas.filters.approved') }}</option>
            </select>
        </div>
    </div>

    <div class="ideas-grid">
        <app-idea-card *ngFor="let idea of filteredIdeas" [idea]="idea"></app-idea-card>
    </div>

    <div *ngIf="filteredIdeas.length === 0" class="no-results">
        <p>{{ langService.translate('ideas.noResults') }}</p>
    </div>
</div>
