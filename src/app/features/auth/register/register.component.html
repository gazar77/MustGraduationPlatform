<div class="auth-page">
    <div class="auth-card card">
        <div class="auth-header">
            <img src="assets/1740307452_295_53683_logo.svg" alt="MUST Logo" style="width: 150px; height: auto; object-fit: contain; margin: 0 auto 10px; display: block;">
            <h2>إنشاء حساب جديد</h2>
            <p>بوابة مشاريع التخرج - كلية الحاسبات والمعلومات</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <label for="name">الاسم الثلاثي باللغة العربية</label>
                <input type="text" id="name" formControlName="name" placeholder="ادخل اسمك بالكامل">
            </div>

            <div class="form-group">
                <label for="email">البريد الإلكتروني الجامعي</label>
                <input type="email" id="email" formControlName="email" placeholder="example@must.edu.eg">
            </div>

            <div class="form-group">
                <label for="department">القسم</label>
                <select id="department" formControlName="department">
                    <option value="">اختار القسم</option>
                    <option value="CS">علوم الحاسب (CS)</option>
                    <option value="IS">نظم المعلومات (IS)</option>
                    <option value="AI">الذكاء الاصطناعي (AI)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" formControlName="password" placeholder="********">
            </div>

            <button type="submit" class="btn btn-primary w-full" [disabled]="registerForm.invalid || isLoading">
                <span *ngIf="!isLoading">إنشاء حساب</span>
                <span *ngIf="isLoading">جاري الحفظ...</span>
            </button>

            <div class="auth-links">
                <span>لديك حساب بالفعل؟</span>
                <a routerLink="/auth/login">تسجيل الدخول</a>
            </div>
        </form>
    </div>
</div>
