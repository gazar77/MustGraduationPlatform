<div class="auth-page">
    <div class="auth-card card">
        <div class="auth-header">
            <img src="assets/must-colored-logo.png" alt="MUST Logo" style="width: 150px; height: auto; object-fit: contain; margin: 0 auto 10px; display: block; border-radius: 8px;">
            <h2>تسجيل الدخول</h2>
            <p>بوابة مشاريع التخرج - كلية الحاسبات والمعلومات</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <label for="email">Username</label>
                <input type="text" id="email" formControlName="email" placeholder="example@must.edu.eg أو الرقم الجامعي" autocomplete="username" [readonly]="step !== 'Identify'">
                <p class="text-muted small mb-0 mt-1" *ngIf="step === 'Identify'">يمكنك إدخال البريد الإلكتروني الجامعي أو الرقم الجامعي</p>
                <div *ngIf="f['email'].touched && f['email'].errors" class="error-msg">
                    <small *ngIf="f['email'].errors['required']">البريد الإلكتروني مطلوب</small>
                    <small *ngIf="f['email'].errors['loginIdentifier']">برجاء إدخال البريد الإلكتروني الجامعي أو الرقم الجامعي بشكل صحيح</small>
                </div>
            </div>

            <div class="form-group" *ngIf="step === 'AdminLogin' || step === 'StudentLogin'">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" formControlName="password" placeholder="********" autocomplete="current-password">
                <div *ngIf="f['password'].touched && f['password'].errors" class="error-msg">
                    <small *ngIf="f['password'].errors['required']">كلمة المرور مطلوبة</small>
                </div>
            </div>

            <div *ngIf="error" class="error-msg" style="margin-bottom: 15px; text-align: center;">
                <p>{{error}}</p>
            </div>

            <button type="submit" class="btn btn-primary w-full" [disabled]="loginForm.invalid || loading">
                <span *ngIf="!loading">
                    {{ step === 'Identify' ? 'متابعة' : 'دخول' }}
                </span>
                <span *ngIf="loading">جاري التحميل...</span>
            </button>

            <div class="auth-links">
                <span>ليس لديك حساب؟</span>
                <a routerLink="/auth/register">إنشاء حساب جديد</a>
            </div>
        </form>
    </div>
</div>
