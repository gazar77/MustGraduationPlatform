<div class="modal-overlay" *ngIf="isOpen" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ title }}</h2>
      <button class="close-btn" (click)="onClose()">&times;</button>
    </div>
    
    <div class="modal-body">
      <div class="form-group" *ngFor="let field of fields">
        <label [for]="field.name">{{ field.label }}</label>
        
        <input *ngIf="field.type === 'text'" 
               type="text" 
               [id]="field.name"
               [attr.name]="field.name"
               [(ngModel)]="formData[field.name]" 
               class="form-control" [placeholder]="'أدخل ' + field.label">
               
        <input *ngIf="field.type === 'date'" 
               type="date" 
               [id]="field.name"
               [attr.name]="field.name"
               [(ngModel)]="formData[field.name]" 
               class="form-control">

        <textarea *ngIf="field.type === 'textarea'" 
                  [id]="field.name"
                  [attr.name]="field.name"
                  [(ngModel)]="formData[field.name]" 
                  class="form-control" rows="4" [placeholder]="'أدخل ' + field.label"></textarea>
                  
        <select *ngIf="field.type === 'select'" 
                [id]="field.name"
                [attr.name]="field.name"
                [(ngModel)]="formData[field.name]" 
                class="form-select">
          <option value="" disabled>اختر {{ field.label }}</option>
          <option *ngFor="let opt of field.options" [value]="opt">{{ opt }}</option>
        </select>
        
        <div *ngIf="field.type === 'readonly'" 
             class="readonly-value p-2 border rounded bg-light text-muted" 
             style="min-height: 38px;">
          {{ formData[field.name] || 'غير متوفر' }}
        </div>

        <input *ngIf="field.type === 'image'"
               type="file"
               [id]="field.name"
               [attr.name]="field.name"
               [accept]="field.accept || 'image/jpeg,image/png,image/webp,image/*'"
               class="form-control"
               (change)="onFileChange(field.name, $event)">

        <input *ngIf="field.type === 'pdf'"
               type="file"
               [id]="field.name"
               [attr.name]="field.name"
               [accept]="field.accept || 'application/pdf,.pdf'"
               class="form-control"
               (change)="onFileChange(field.name, $event)">

        <input *ngIf="field.type === 'word'"
               type="file"
               [id]="field.name"
               [attr.name]="field.name"
               [accept]="field.accept || '.doc,.docx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document'"
               class="form-control"
               (change)="onFileChange(field.name, $event)">
      </div>
      <div *ngIf="errorMessage" class="modal-error alert alert-danger mb-0 mt-2" role="alert">{{ errorMessage }}</div>
    </div>
    
    <div class="modal-footer">
      <button *ngIf="showPdfDownload" type="button" class="btn btn-outline-primary" (click)="downloadPdf.emit()">تحميل PDF</button>
      <button *ngIf="showFileDownload" type="button" class="btn btn-outline-secondary" (click)="downloadFile.emit()">تحميل الكل (ZIP)</button>
      <button class="btn btn-secondary" (click)="onClose()">إلغاء</button>
      <button class="btn btn-primary" (click)="onSave()">حفظ البيانات</button>
    </div>
  </div>
</div>
